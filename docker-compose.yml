version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install --no-cache-dir streamlit pandas && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
