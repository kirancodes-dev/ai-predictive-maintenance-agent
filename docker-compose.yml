version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./predictive_maintenance.db
      - SIMULATION_SERVER_URL=http://simulation:3000
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost:8501"]
    depends_on:
      simulation:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  simulation:
    build:
      context: ./simulation-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./predictive-maintenance-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install --no-cache-dir streamlit pandas requests && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
